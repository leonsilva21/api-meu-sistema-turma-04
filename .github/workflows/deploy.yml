name: Deploy para AWS App Runner

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.PROJECT_NAME || 'meusistema-api' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Maven (empacotar JAR)
        run: ./mvnw -B -DskipTests package

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          # Descobre o Account ID se não estiver definido como secret (facilita a vida do aluno).
          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          fi

          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

      - name: Build e push da imagem Docker
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          fi

          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}

          echo "Construindo imagem ${IMAGE_URI}"
          docker build -t ${IMAGE_URI} .

          echo "Publicando imagem ${IMAGE_URI}"
          docker push ${IMAGE_URI}

          echo "Também marcando como 'latest'"
          LATEST_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest
          docker tag ${IMAGE_URI} ${LATEST_URI}
          docker push ${LATEST_URI}

          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV

      - name: Atualizar serviço App Runner com nova imagem
        env:
          APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          # First-run friendly: tenta descobrir o ARN pelo nome do serviço.
          if [ -z "${APP_RUNNER_SERVICE_ARN}" ]; then
            APP_RUNNER_SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='${ECR_REPOSITORY}'].ServiceArn | [0]" --output text)
          fi

          if [ -z "${APP_RUNNER_SERVICE_ARN}" ] || [ "${APP_RUNNER_SERVICE_ARN}" = "None" ]; then
            echo "APP_RUNNER_SERVICE_ARN não encontrado. Rode primeiro o Provision Infrastructure (Terraform apply) para criar o serviço App Runner." >&2
            exit 1
          fi

          aws apprunner update-service \
            --service-arn "${APP_RUNNER_SERVICE_ARN}" \
            --source-configuration "ImageRepository={ImageIdentifier=${IMAGE_URI},ImageRepositoryType=ECR,ImageConfiguration={Port=8080}}"
