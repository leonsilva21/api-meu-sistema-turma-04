name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Escolha se quer aplicar ou destruir a infraestrutura
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  # Default: usa o nome do repositório (bom para labs, evita colisões na mesma conta AWS).
  # Observação: nomes de repositório no ECR normalmente devem ser minúsculos; se o seu repo tiver maiúsculas,
  # configure explicitamente a variável PROJECT_NAME no GitHub.
  TF_VAR_project_name: ${{ vars.PROJECT_NAME || github.event.repository.name }}
  TF_VAR_db_username: ${{ secrets.TF_DB_USER }}
  TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
  TF_VAR_artifact_bucket_name: ${{ vars.ARTIFACT_BUCKET_NAME || '' }}
  TF_VAR_version_label: ${{ github.sha }}
  TF_OPERATION: ${{ github.event.inputs.operation || 'apply' }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build backend artifact
        run: ./mvnw -B package -DskipTests

      - name: Export Terraform artifact path
        run: |
          BACKEND_JAR=$(ls target/*.jar | head -n 1)
          if [ -z "$BACKEND_JAR" ]; then
            echo "Nenhum JAR encontrado em target/. Execute o build antes do Terraform."
            exit 1
          fi
          echo "TF_VAR_artifact_jar_path=../$BACKEND_JAR" >> $GITHUB_ENV

      - name: Restore previous Terraform state (artifact)
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: terraform.yml
          name: terraform-state
          path: infra
          workflow_conclusion: success
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Guardrail (destroy requires state)
        if: env.TF_OPERATION == 'destroy'
        working-directory: infra
        run: |
          set -euo pipefail
          if [ ! -f terraform.tfstate ]; then
            cat >&2 <<'EOF'
Nenhum `infra/terraform.tfstate` foi encontrado para este repositório.

Sem o state, o Terraform pode “destruir com sucesso” sem remover nada (porque ele não sabe o que criou).

Como resolver:
1) Rode `apply` pelo menos uma vez com sucesso (isso faz upload do state como artifact), ou
2) Use um backend remoto de state (S3/DynamoDB) para estado persistente, ou
3) Apague manualmente os recursos no AWS Console.
EOF
            exit 1
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Preflight (App Runner disponível na conta?)
        if: env.TF_OPERATION == 'apply'
        run: |
          set -euo pipefail
          echo "Checando acesso ao AWS App Runner na conta/região..."
          if ! out=$(aws apprunner list-services --max-results 1 2>&1); then
            echo "$out" >&2
            if echo "$out" | grep -q "SubscriptionRequiredException"; then
              cat >&2 <<'EOF'

ERRO: Sua conta AWS não está habilitada/subscrita para o AWS App Runner (SubscriptionRequiredException).

Como resolver (rápido):
1) Entre no AWS Console e confirme que a conta está com Billing ativo (cartão configurado) e finalizou o onboarding.
2) Abra o Console do App Runner na região usada (ex.: us-east-1) e complete qualquer tela de "Get started/Enable".
3) Se você estiver usando ambiente educacional/sandbox (AWS Academy/AWS Educate), App Runner pode não estar disponível.

Depois disso, rode o workflow novamente.
EOF
            exit 1
          fi
            echo "Falha ao acessar App Runner. Verifique credenciais/região/permissões."
            exit 1
          fi
          echo "OK: App Runner acessível."

      - name: Terraform init
        working-directory: infra
        run: terraform init

      # First-run friendly:
      # O App Runner precisa de uma imagem existente no ECR (ex.: :latest) para não falhar em CREATE_FAILED.
      # Então fazemos bootstrap do repositório e publicamos uma imagem antes do apply completo.
      - name: Ensure ECR repository is in Terraform state (import if needed)
        if: env.TF_OPERATION == 'apply'
        working-directory: infra
        run: |
          PROJECT_NAME="${TF_VAR_project_name:-meusistema-api}"
          if aws ecr describe-repositories --repository-names "${PROJECT_NAME}" >/dev/null 2>&1; then
            if ! terraform state list | grep -q '^aws_ecr_repository\.app_repo$'; then
              echo "ECR repo '${PROJECT_NAME}' já existe; importando para o state do Terraform..."
              terraform import aws_ecr_repository.app_repo "${PROJECT_NAME}"
            fi
          fi

      - name: Ensure shared-name resources are in Terraform state (import if needed)
        if: env.TF_OPERATION == 'apply'
        working-directory: infra
        run: |
          set -euo pipefail
          PROJECT_NAME="${TF_VAR_project_name:-meusistema-api}"

          # RDS DB subnet group (nome global por conta/região)
          DB_SUBNET_GROUP="${PROJECT_NAME}-db-subnets"
          if aws rds describe-db-subnet-groups --db-subnet-group-name "${DB_SUBNET_GROUP}" >/dev/null 2>&1; then
            if ! terraform state list | grep -q '^aws_db_subnet_group\.db_subnets$'; then
              echo "DB subnet group '${DB_SUBNET_GROUP}' já existe; importando..."
              terraform import aws_db_subnet_group.db_subnets "${DB_SUBNET_GROUP}"
            fi
          fi

          # IAM role (nome global na conta)
          ROLE_NAME="${PROJECT_NAME}-apprunner-ecr-role"
          if aws iam get-role --role-name "${ROLE_NAME}" >/dev/null 2>&1; then
            if ! terraform state list | grep -q '^aws_iam_role\.apprunner_ecr_access$'; then
              echo "IAM role '${ROLE_NAME}' já existe; importando..."
              terraform import aws_iam_role.apprunner_ecr_access "${ROLE_NAME}"
            fi
          fi

      - name: Terraform apply (bootstrap ECR)
        if: env.TF_OPERATION == 'apply'
        working-directory: infra
        run: terraform apply -auto-approve -target=aws_ecr_repository.app_repo

      - name: Bootstrap Docker image (push :latest)
        if: env.TF_OPERATION == 'apply'
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          # Descobre o Account ID se não estiver definido como secret (facilita a vida do aluno).
          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          fi

          PROJECT_NAME="${TF_VAR_project_name:-meusistema-api}"
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}:latest"

          printf "IMAGE_URI=%s\n" "${IMAGE_URI}" >> "${GITHUB_ENV}"

          aws ecr get-login-password --region "${AWS_REGION}" | \
            docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          echo "Building Docker image ${IMAGE_URI}"
          docker build -t "${IMAGE_URI}" .

          echo "Pushing Docker image ${IMAGE_URI}"
          docker push "${IMAGE_URI}"

      - name: Terraform plan (${{ env.TF_OPERATION }})
        working-directory: infra
        run: |
          if [ "${TF_OPERATION}" = "destroy" ]; then
            terraform plan -out=tfplan -destroy
          else
            terraform plan -out=tfplan
          fi

      - name: Terraform ${{ env.TF_OPERATION }}
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      - name: Show Terraform outputs
        if: env.TF_OPERATION == 'apply'
        working-directory: infra
        run: terraform output

      - name: Upload Terraform state artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: infra/terraform.tfstate
